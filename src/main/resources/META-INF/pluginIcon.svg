<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- 深色圆角背景 -->
  <rect width="40" height="40" rx="8" fill="#1E293B"/>

  <!-- 竖向主路径线 -->
  <line x1="11" y1="8" x2="11" y2="33" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 分支路径曲线 -->
  <path d="M11 16 C11 11 23 11 23 8" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M11 24 C11 28 21 28 21 26" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- 主路径端点 -->
  <circle cx="11" cy="8" r="3" fill="#3B82F6"/>
  <circle cx="11" cy="16" r="2.5" fill="#3B82F6"/>
  <circle cx="11" cy="24" r="2.5" fill="#3B82F6"/>
  <circle cx="11" cy="33" r="3" fill="#3B82F6"/>

  <!-- 分支末端端点 -->
  <circle cx="23" cy="8" r="2.5" fill="#60A5FA"/>
  <circle cx="21" cy="26" r="2.5" fill="#60A5FA"/>

  <!-- 放大镜 -->
  <circle cx="30" cy="20" r="5" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <line x1="33.8" y1="23.8" x2="37" y2="27" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 装饰小点 -->
  <circle cx="35" cy="12" r="1.2" fill="#FBBF24" opacity="0.8"/>
  <circle cx="28" cy="32" r="0.9" fill="#93C5FD" opacity="0.7"/>
</svg>
