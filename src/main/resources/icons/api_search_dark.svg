<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- API 端点搜索图标（暗色主题）：端点节点 + 连线 + 放大镜 -->

  <!-- 竖向主路径线 -->
  <line x1="4" y1="2" x2="4" y2="13" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 分支路径曲线（从中间节点延伸到右侧） -->
  <path d="M4 7 C4 4.5 10 4.5 10 3" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M4 10 C4 12 9 12 9 11" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- 主路径端点 -->
  <circle cx="4" cy="2" r="1.5" fill="#60A5FA"/>
  <circle cx="4" cy="7" r="1.5" fill="#60A5FA"/>
  <circle cx="4" cy="10" r="1.5" fill="#60A5FA"/>
  <circle cx="4" cy="13" r="1.5" fill="#60A5FA"/>

  <!-- 分支末端端点 -->
  <circle cx="10" cy="3" r="1.3" fill="#93C5FD"/>
  <circle cx="9" cy="11" r="1.3" fill="#93C5FD"/>

  <!-- 放大镜（搜索象征，暗色主题用更亮的黄色） -->
  <circle cx="12.5" cy="8.5" r="2" fill="none" stroke="#FBBF24" stroke-width="1.3"/>
  <line x1="14" y1="10" x2="15.3" y2="11.3" stroke="#FBBF24" stroke-width="1.3" stroke-linecap="round"/>
</svg>
